<!DOCTYPE html>
<html>
<head>
    <title>API Table Display</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>User Data in Table Format</h1>

    <button onclick="loadUsers()">Load Users</button>

    <table border="1" id="userTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>City</th>
            </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>
